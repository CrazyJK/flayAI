<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base unit" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--background); font-family: var(--font-sans); color: var(--foreground); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .bar { background: var(--primary); border-radius: 2px; height: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><span class="lbl">1·4</span></div>
    <div class="item"><div class="bar" style="width:8px"></div><span class="lbl">2·8</span></div>
    <div class="item"><div class="bar" style="width:12px"></div><span class="lbl">3·12</span></div>
    <div class="item"><div class="bar" style="width:16px"></div><span class="lbl">4·16</span></div>
    <div class="item"><div class="bar" style="width:24px"></div><span class="lbl">6·24</span></div>
    <div class="item"><div class="bar" style="width:32px"></div><span class="lbl">8·32</span></div>
    <div class="item"><div class="bar" style="width:48px"></div><span class="lbl">xxl·48</span></div>
    <div class="item"><div class="bar" style="width:80px"></div><span class="lbl">section·80</span></div>
  </div>
</body>
</html>
