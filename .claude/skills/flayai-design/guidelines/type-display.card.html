<!-- @dsCard group="Type" viewport="700x300" name="Display Ladder" subtitle="SF Pro Display — negative tracking, weight 600" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--canvas); font-family: var(--font-display); color: var(--ink); }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted-48); width: 132px; flex-shrink: 0; }
  .hero { font-size: var(--text-hero); font-weight: 600; line-height: var(--leading-hero); letter-spacing: var(--tracking-hero); }
  .dlg { font-size: var(--text-display-lg); font-weight: 600; line-height: var(--leading-tight); letter-spacing: var(--tracking-display); }
  .dmd { font-size: var(--text-display-md); font-weight: 600; letter-spacing: var(--tracking-display); }
  .lead { font-size: var(--text-lead); font-weight: 400; line-height: var(--leading-tight); }
  .tagline { font-size: var(--text-tagline); font-weight: 600; line-height: var(--leading-snug); }
</style>
</head>
<body>
  <div class="row"><span class="tag">hero · 56 / 600</span><span class="hero">무엇을 찾을까요</span></div>
  <div class="row"><span class="tag">display-lg · 40 / 600</span><span class="dlg">로컬에서, 자연어로</span></div>
  <div class="row"><span class="tag">display-md · 34 / 600</span><span class="dmd">하이브리드 검색</span></div>
  <div class="row"><span class="tag">lead · 28 / 400</span><span class="lead">영상을 말로 찾는 가장 빠른 길.</span></div>
  <div class="row"><span class="tag">tagline · 21 / 600</span><span class="tagline">flayAI 채팅</span></div>
</body>
</html>
