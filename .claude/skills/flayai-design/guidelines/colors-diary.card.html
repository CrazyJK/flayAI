<!-- @dsCard group="Colors" viewport="700x160" name="Diary Mood" subtitle="Warm cream + serif scoped palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; }
  .mood { padding: 18px; background: var(--background); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 80px; height: 52px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font-family: var(--font-sans); font-size: 12px; color: var(--foreground); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
  .serif { font-family: var(--font-serif); font-size: 17px; color: var(--foreground); }
</style>
</head>
<body>
  <div class="mood diary-mood">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--background)"></div><span class="name">background</span><span class="hex">#faf6ec</span></div>
      <div class="sw"><div class="chip" style="background:var(--card)"></div><span class="name">card</span><span class="hex">#fffdf6</span></div>
      <div class="sw"><div class="chip" style="background:var(--muted)"></div><span class="name">muted</span><span class="hex">#efe7d6</span></div>
      <div class="sw"><div class="chip" style="background:var(--border)"></div><span class="name">border</span><span class="hex">#e6dcc6</span></div>
      <div class="sw"><span class="serif">오늘은 어땠어?</span><span class="hex">font-serif · Georgia / Noto Serif KR</span></div>
    </div>
  </div>
</body>
</html>
