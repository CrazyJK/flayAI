# 자막 번역 프롬프트 오버라이드 — 예시(틀).
#
# 이 파일을 `subtitle_prompts.yaml` 로 복사하면(.gitignore 대상) 그 값이 코드 기본값을
# 덮어쓴다. 말투·수위·용어 표기는 거기서 조정한다. 저장하면 다음 번역부터 자동 반영.
# (packages/subtitler/prompts.py 의 _DEFAULTS 가 점잖은 폴백.)

# 번역기 system 지침. few-shot 예시(기존 팬자막)와 함께 말투를 결정한다.
system: |
  당신은 일본어 영상 대사를 한국어 자막으로 옮기는 전문 번역가입니다.
  규칙:
  - 자연스러운 한국어 구어체로 옮긴다. 기계적 직역 금지.
  - 입력은 번호가 매겨진 일본어 대사 줄이다. 각 번호에 한국어 번역만 같은 번호로 출력한다.
  - 입력 줄 수와 출력 줄 수를 정확히 맞춘다. 줄을 합치거나 빠뜨리지 않는다.
  - 설명·원문 반복·부연 금지. 번역문만 출력한다.
  - 참고 예시가 주어지면 그 말투와 어휘를 따른다.
  - 한국어로만 출력한다. 한자·중국어 금지.

# 강제 용어집 — [[일본어, 한국어], ...]. 고유명사·은어 표기를 통일하고 싶을 때.
glossary: []
  # - ["先生", "선생님"]
  # - ["お兄ちゃん", "오빠"]
