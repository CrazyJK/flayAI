# flayAI 평가셋 (AI_PLAN.md §11.1)
#
# 평가 형식
# ---------
# 각 케이스는 chat API(POST /api/chat) 의 SSE 결과를 평가한다.
# eval/run_eval.py 가 모든 tool_result.items 를 수집해 `hits` 리스트로 만들고,
# 아래 expect 조건들을 검증한다.
#
# expect 키 (전부 선택)
#   min_results: int        : hits 길이 >= n
#   max_results: int        : hits 길이 <= n
#   contains_actress: str   : 어떤 hit 라도 actresses 에 포함
#   contains_opus: [str]    : hits 중 opus 가 모두 등장
#   all_must_have:          : 모든 hit 가 조건 만족
#     kind: instance|archive
#     studio: str
#     year: int
#     month: int
#     playable: true|false
#   same_result_as: id      : 다른 케이스 결과와 top-3 opus 교집합 >= 1
#   ocr_search: bool        : chat 대신 /api/search/poster-ocr 호출
#   face_search: str        : 이미지 path → /api/search/face (얼굴 케이스, 수동)
#
# 통과 기준 (M6): 정답률 ≥ 85%

# ============== 1. 배우 정확매칭 (4) ==============
- id: actress-exact-001
  query: "Kawakita Saika 출연작 5개 추천해줘"
  expect:
    min_results: 1
    contains_actress: "kawakita saika"

- id: actress-exact-002
  query: "Miku Ohashi 영상 보여줘"
  expect:
    min_results: 1
    contains_actress: "miku ohashi"

- id: actress-exact-003
  query: "Kaori Maeda 출연작"
  expect:
    min_results: 1
    contains_actress: "kaori maeda"

- id: actress-exact-004
  query: "Ai Asakura 출연작 3개 이상"
  expect:
    min_results: 3
    contains_actress: "ai asakura"

