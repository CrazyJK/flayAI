services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: flayai-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"   # gRPC (선택)
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      # qdrant 이미지엔 wget/curl 이 없음 → bash 의 /dev/tcp 로 6333 포트 TCP liveness 체크
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
